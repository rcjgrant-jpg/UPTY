<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 100">
  <defs>
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5B4AE8"/>
      <stop offset="100%" style="stop-color:#6F90FF"/>
    </linearGradient>
  </defs>
  
  <!-- U with gradient -->
  <text x="5" y="75" fill="url(#blueGradient)" font-family="Arial, Helvetica, sans-serif" font-weight="bold" font-size="72px">U</text>
  
  <!-- Arrow icon -->
  <g fill="none" stroke="#2854C5" stroke-width="10" stroke-linecap="round" stroke-linejoin="round">
    <line x1="60" y1="70" x2="105" y2="20"/>
    <polyline points="75,20 105,20 105,50"/>
  </g>
</svg>
