<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 100">
  <defs>
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5B4AE8"/>
      <stop offset="100%" style="stop-color:#6F90FF"/>
    </linearGradient>
  </defs>
  
  <!-- Upty text with gradient -->
  <text x="10" y="75" fill="url(#blueGradient)" font-family="Arial, Helvetica, sans-serif" font-weight="bold" font-size="72px">Upty</text>
  
  <!-- Arrow icon closer to text -->
  <g fill="none" stroke="#2854C5" stroke-width="10" stroke-linecap="round" stroke-linejoin="round">
    <line x1="200" y1="70" x2="255" y2="18"/>
    <polyline points="222,18 255,18 255,50"/>
  </g>
</svg>
